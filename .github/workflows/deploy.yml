# Deploy HookShot to VPS on push to main.
# First-time on server: clone repo to /root/hookshot, then create systemd service for HookShot app in /root/hookshot/HookShot (see HookShot/HOOKSHOT_DEPLOY.md).
# Add secrets: VPS_HOST, VPS_USER, VPS_PASSWORD
name: Deploy HookShot
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          apt-get update -qq && apt-get install -y -qq sshpass rsync
          export SSHPASS="$VPS_PASSWORD"
          sshpass -e ssh -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "cd /root/hookshot && git fetch origin && git diff --name-only --diff-filter=A HEAD..origin/main | xargs -r rm -f && git pull origin main && cp /root/hookshot/hookshot.service /etc/systemd/system/hookshot.service && systemctl daemon-reload && systemctl restart hookshot"
          echo "Deploy done."
