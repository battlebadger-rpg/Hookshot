<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HookShot — Batch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #f8f8f8; color: #1a1a1a; min-height: 100vh; }
header { padding: 12px 20px; background: #fff; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; }
header a { color: #666; text-decoration: none; font-size: 14px; font-weight: 500; padding: 6px 12px; border-radius: 8px; flex-shrink: 0; }
header a:hover { color: #38bdf8; background: #f0f9ff; }
header .logo { display: flex; align-items: center; gap: 8px; color: #38bdf8; font-weight: 600; font-size: 17px; flex-shrink: 0; }
header .logo svg { width: 22px; height: 22px; }
header .spacer { flex: 1; min-width: 12px; }
header .signout { font-size: 12px; color: #999; border: 1px solid #eee; flex-shrink: 0; }

.container { max-width: 1100px; margin: 24px auto; padding: 0 16px; }
.card { background: #fff; border-radius: 16px; border: 1px solid #e8e8e8; padding: 20px; margin-bottom: 20px; }
.card-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.card-sub { font-size: 13px; color: #999; margin-bottom: 16px; }

/* top bar */
.top-bar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
.top-bar h2 { font-size: 17px; font-weight: 600; }
.top-bar .sub { font-size: 13px; color: #999; }
.btn { padding: 9px 16px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; background: #38bdf8; color: #fff; text-decoration: none; display: inline-block; touch-action: manipulation; transition: background 0.15s; }
.btn:hover { background: #7dd3fc; }
.btn:disabled { background: #e0e0e0; color: #aaa; cursor: not-allowed; }
.btn-outline { background: #fff; border: 1px solid #e0e0e0; color: #555; }
.btn-outline:hover { background: #f5f5f5; }
.btn-green { background: #22c55e; }
.btn-green:hover { background: #16a34a; }

/* layout: grid or video cards */
.batch-layout { display: grid; grid-template-columns: 1fr 260px; gap: 20px; align-items: start; }

/* item list */
.items { display: flex; flex-direction: column; gap: 6px; }
.item {
  display: grid;
  grid-template-columns: auto 1fr auto auto auto;
  gap: 10px;
  align-items: center;
  padding: 10px 14px;
  background: #fafafa;
  border-radius: 10px;
  font-size: 13px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.item:hover { background: #f0f9ff; border-color: #bae6fd; }
.item.active { background: #f0f9ff; border-color: #38bdf8; }
.item.approved { border-color: #22c55e; background: #f0fdf4; }
.item.rejected { opacity: 0.5; }
.item .num { font-size: 11px; color: #bbb; font-weight: 600; width: 20px; }
.item .caption { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #444; }
.item .video-id { font-size: 11px; color: #bbb; white-space: nowrap; }
.item .posted-badge { font-size: 11px; color: #22c55e; white-space: nowrap; }
.item .status-icon { font-size: 14px; width: 20px; text-align: center; }

/* preview panel */
.preview-panel { position: sticky; top: 24px; }
.preview-frame {
  background: #0a0a0a;
  border-radius: 14px;
  overflow: hidden;
  aspect-ratio: 9/16;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
}
.preview-frame video { width: 100%; height: 100%; object-fit: contain; display: block; }
.preview-placeholder { text-align: center; color: #555; font-size: 12px; padding: 20px; }
.preview-placeholder svg { width: 32px; height: 32px; color: #333; display: block; margin: 0 auto 8px; }
.preview-loading { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a0a; color: #888; font-size: 13px; z-index: 2; gap: 12px; }
.preview-loading.hidden { display: none; }
.preview-loading::before { content: ''; width: 32px; height: 32px; border: 3px solid #333; border-top-color: #38bdf8; border-radius: 50%; animation: spin 0.8s linear infinite; }
.preview-loading span { color: #888; }
@keyframes spin { to { transform: rotate(360deg); } }

.preview-caption { font-size: 12px; color: #666; line-height: 1.4; margin-bottom: 12px; min-height: 32px; }

.preview-actions { display: flex; gap: 8px; margin-bottom: 10px; }
.btn-approve { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; background: #dcfce7; color: #15803d; transition: all 0.15s; touch-action: manipulation; }
.btn-approve:hover, .btn-approve.active { background: #22c55e; color: #fff; }
.btn-reject { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; background: #f4f4f4; color: #999; transition: all 0.15s; touch-action: manipulation; }
.btn-reject:hover, .btn-reject.active { background: #fee2e2; color: #dc2626; }

.preview-meta { font-size: 11px; color: #bbb; display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }

.dl-row { display: flex; gap: 8px; }

/* approve summary bar */
.approve-bar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
.approve-bar .summary { font-size: 13px; color: #888; }

@media (max-width: 700px) {
  .batch-layout { grid-template-columns: 1fr; }
  .preview-panel { position: static; }
  .item { grid-template-columns: auto 1fr auto; }
  .item .video-id, .item .status-icon { display: none; }
}
</style>
</head>
<body>
<header>
  <a href="/" class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>HookShot</a>
  <a href="/">Dashboard</a>
  <a href="/library">Video Library</a>
  <a href="/captions">Captions</a>
  <a href="/models">Models</a>
  <a href="/batches">Batches</a>
  <a href="/report">Report</a>
  <span class="spacer"></span>
  <a href="/logout" class="signout">Sign out</a>
</header>
<div class="container">
  <div class="card">
    <div class="top-bar">
      <div>
        <div class="card-title" id="batchTitle">Batch</div>
        <div class="card-sub" id="batchSub"></div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-green" id="downloadApprovedBtn" disabled>Download approved</button>
      </div>
    </div>

    <div class="approve-bar">
      <span class="summary" id="approveSummary">Select items to approve or reject</span>
    </div>

    <div class="batch-layout">
      <div class="items" id="items"></div>

      <div class="preview-panel">
        <div class="preview-frame" id="previewFrame">
          <div class="preview-placeholder" id="previewPlaceholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
            Click an item to preview
          </div>
          <div class="preview-loading hidden" id="previewLoading"><span>Loading…</span></div>
          <video id="previewVideo" loop playsinline preload="auto" style="display:none"></video>
        </div>
        <div class="preview-caption" id="previewCaption"></div>
        <div class="preview-actions" id="previewActions" style="display:none">
          <button class="btn-approve" id="approveBtn">✓ Approve</button>
          <button class="btn-reject" id="rejectBtn">✗ Reject</button>
        </div>
        <div class="preview-meta" id="previewMeta"></div>
        <div class="dl-row" id="dlRow" style="display:none">
          <a href="#" id="dlSingle" class="btn btn-outline" style="flex:1;text-align:center;font-size:12px">Download this video</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const batchId = '{{ batch_id }}';
const STORAGE_KEY = 'approvals_' + batchId;
const itemsEl = document.getElementById('items');
const batchTitle = document.getElementById('batchTitle');
const batchSub = document.getElementById('batchSub');
const downloadApprovedBtn = document.getElementById('downloadApprovedBtn');
const approveSummary = document.getElementById('approveSummary');
const previewFrame = document.getElementById('previewFrame');
const previewPlaceholder = document.getElementById('previewPlaceholder');
const previewLoading = document.getElementById('previewLoading');
const previewVideo = document.getElementById('previewVideo');
const previewCaption = document.getElementById('previewCaption');
const previewActions = document.getElementById('previewActions');
const previewMeta = document.getElementById('previewMeta');
const approveBtn = document.getElementById('approveBtn');
const rejectBtn = document.getElementById('rejectBtn');
const dlRow = document.getElementById('dlRow');
const dlSingle = document.getElementById('dlSingle');

let batchItems = [];
let approvedSet = new Set();
let rejectedSet = new Set();
let activeItemId = null;

// ── Approval persistence ───────────────────────────────────────────────────
function saveApprovals() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      approved: [...approvedSet],
      rejected: [...rejectedSet]
    }));
  } catch(e) {}
}

function loadApprovals() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const d = JSON.parse(saved);
      approvedSet = new Set(d.approved || []);
      rejectedSet = new Set(d.rejected || []);
    }
  } catch(e) {}
}

function updateApprovalUI() {
  const total = batchItems.length;
  const approved = approvedSet.size;
  const rejected = rejectedSet.size;
  const pending = total - approved - rejected;
  approveSummary.textContent = `${approved} approved · ${rejected} rejected · ${pending} pending`;
  downloadApprovedBtn.disabled = approved === 0;
}

function setActiveItem(it) {
  activeItemId = it.id;
  document.querySelectorAll('.item').forEach(el => el.classList.remove('active'));
  const row = document.querySelector(`.item[data-id="${it.id}"]`);
  if (row) row.classList.add('active');

  previewPlaceholder.style.display = 'none';
  previewVideo.style.display = 'block';
  previewVideo.src = '';
  if (it.output_filename) {
    previewLoading.classList.remove('hidden');
    previewVideo.src = `/preview/${batchId}/${it.output_filename}`;
    previewVideo.play().catch(() => {});
  } else {
    previewLoading.classList.add('hidden');
  }

  previewCaption.textContent = it.caption_preview || '';
  previewActions.style.display = 'flex';
  dlRow.style.display = 'flex';

  approveBtn.classList.toggle('active', approvedSet.has(it.id));
  rejectBtn.classList.toggle('active', rejectedSet.has(it.id));

  previewMeta.innerHTML = `<span>Video: ${it.video_id}</span><span>Caption: ${it.caption_id}</span>`;

  if (it.output_filename) {
    dlSingle.href = `/download/${batchId}/${it.output_filename}`;
    dlSingle.style.opacity = '1';
    dlSingle.style.pointerEvents = 'auto';
  } else {
    dlSingle.href = '#';
    dlSingle.style.opacity = '0.4';
    dlSingle.style.pointerEvents = 'none';
  }
}

previewVideo.addEventListener('canplay', () => previewLoading.classList.add('hidden'));
previewVideo.addEventListener('canplaythrough', () => previewLoading.classList.add('hidden'));
previewVideo.addEventListener('error', () => previewLoading.classList.add('hidden'));

approveBtn.addEventListener('click', () => {
  if (!activeItemId) return;
  approvedSet.add(activeItemId);
  rejectedSet.delete(activeItemId);
  approveBtn.classList.add('active');
  rejectBtn.classList.remove('active');
  const row = document.querySelector(`.item[data-id="${activeItemId}"]`);
  if (row) { row.classList.add('approved'); row.classList.remove('rejected'); }
  const statusIcon = row && row.querySelector('.status-icon');
  if (statusIcon) statusIcon.textContent = '✓';
  saveApprovals();
  updateApprovalUI();
});

rejectBtn.addEventListener('click', () => {
  if (!activeItemId) return;
  rejectedSet.add(activeItemId);
  approvedSet.delete(activeItemId);
  rejectBtn.classList.add('active');
  approveBtn.classList.remove('active');
  const row = document.querySelector(`.item[data-id="${activeItemId}"]`);
  if (row) { row.classList.add('rejected'); row.classList.remove('approved'); }
  const statusIcon = row && row.querySelector('.status-icon');
  if (statusIcon) statusIcon.textContent = '✗';
  saveApprovals();
  updateApprovalUI();
});

// Individual file downloads (no zip)
downloadApprovedBtn.addEventListener('click', async () => {
  if (approvedSet.size === 0) return;
  const approvedFiles = batchItems.filter(it => approvedSet.has(it.id) && it.output_filename);
  downloadApprovedBtn.disabled = true;
  downloadApprovedBtn.textContent = `Downloading ${approvedFiles.length}…`;
  for (const it of approvedFiles) {
    const a = document.createElement('a');
    a.href = `/download/${batchId}/${it.output_filename}`;
    a.download = it.output_filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    await new Promise(r => setTimeout(r, 600));
  }
  downloadApprovedBtn.disabled = false;
  downloadApprovedBtn.textContent = 'Download approved';
});

loadApprovals();

fetch('/api/batches/' + batchId).then(r => r.json()).then(data => {
  if (data.error) { batchTitle.textContent = 'Not found'; return; }
  batchTitle.textContent = data.week_of || data.account_name || 'Batch';
  batchSub.textContent = 'Created: ' + (data.created_at || '').slice(0, 16).replace('T', ' ');
  batchItems = data.items;
  updateApprovalUI();

  itemsEl.innerHTML = data.items.map((it, idx) => {
    return `<div class="item" data-id="${it.id}" data-idx="${idx}">
      <span class="num">${idx + 1}</span>
      <span class="caption" title="${(it.caption_preview || '').replace(/"/g, '&quot;')}">${it.caption_preview || '—'}</span>
      <span class="video-id">${it.video_id}</span>
      <span class="posted-badge"></span>
      <span class="status-icon"></span>
    </div>`;
  }).join('');

  // Restore saved approval state visually
  batchItems.forEach(it => {
    const row = document.querySelector(`.item[data-id="${it.id}"]`);
    if (!row) return;
    const icon = row.querySelector('.status-icon');
    if (approvedSet.has(it.id)) {
      row.classList.add('approved');
      if (icon) icon.textContent = '✓';
    } else if (rejectedSet.has(it.id)) {
      row.classList.add('rejected');
      if (icon) icon.textContent = '✗';
    }
  });

  itemsEl.querySelectorAll('.item').forEach(row => {
    row.addEventListener('click', () => {
      const it = batchItems.find(x => x.id === parseInt(row.dataset.id));
      if (it) setActiveItem(it);
    });
  });

  if (data.items.length) setActiveItem(data.items[0]);
}).catch(() => { batchTitle.textContent = 'Error loading batch'; });
</script>
</body>
</html>
